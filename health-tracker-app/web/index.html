<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health Tracker</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Health Tracker</h1>
      <p>Ji Hong / Mabel 共享健康记录</p>
      <div class="toolbar">
        <select id="personSelect">
          <option>Ji Hong</option>
          <option>Mabel</option>
        </select>
        <button id="refreshBtn">刷新</button>
      </div>
    </header>
    <section class="card">
      <h2>今日摘要</h2>
      <pre id="todayBox">加载中...</pre>
    </section>
    <section class="grid">
      <section class="card">
        <h2>体重历史</h2>
        <div id="weightsTable"></div>
      </section>
      <section class="card">
        <h2>饮食历史</h2>
        <div id="mealsTable"></div>
      </section>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
